name: Publish GitHub Release
description: Merge multi-arch update manifests, then create/update a GitHub Release and upload all artifacts

inputs:
  artifacts-path:
    description: 'Directory containing the release-assets-* directories'
    required: true
  tag:
    description: 'Git tag (e.g. v1.2.3)'
    required: true
  release-type:
    description: 'Release type: release, draft, or prerelease'
    required: false
    default: 'release'

outputs:
  release-url:
    description: 'URL of the created GitHub Release'
    value: ${{ steps.publish.outputs.release-url }}

runs:
  using: composite
  steps:
    # Some platforms expose one update channel file per OS regardless of CPU
    # architecture (Windows -> latest.yml, macOS -> latest-mac.yml), so two
    # native runners produce same-named manifests that each list only their own
    # arch. Union their files[] into one before upload. (Linux is unaffected:
    # electron-builder names its channel files per-arch — latest-linux.yml vs
    # latest-linux-arm64.yml — and electron-updater fetches the matching name.)
    - name: Consolidate multi-arch update manifests
      shell: bash
      run: |
        set -euo pipefail
        if ! python3 -c "import yaml" 2>/dev/null; then
          pip3 install --quiet --disable-pip-version-check pyyaml 2>/dev/null \
            || pip3 install --quiet --disable-pip-version-check --break-system-packages pyyaml
        fi
        python3 "$GITHUB_ACTION_PATH/merge_update_manifests.py" "${{ inputs.artifacts-path }}"

    - name: Publish release
      id: publish
      shell: bash
      run: |
        set -euo pipefail

        ARTIFACTS_DIR="${{ inputs.artifacts-path }}"
        TAG="${{ inputs.tag }}"
        RELEASE_TYPE="${{ inputs.release-type }}"

        # Known parasitic files: raw executables from jpackage app-image and internal metadata
        SKIP_NAMES='^(java\.exe|javaw\.exe|signing-metadata\.json|packaging-metadata\.json)$'

        # Build gh release create flags
        CREATE_FLAGS=("--title" "$TAG" "--generate-notes")
        case "$RELEASE_TYPE" in
          draft)      CREATE_FLAGS+=("--draft") ;;
          prerelease) CREATE_FLAGS+=("--prerelease") ;;
          release)    ;; # default, no extra flags
          *)          echo "Unknown release type: $RELEASE_TYPE"; exit 1 ;;
        esac

        # Create the release if it doesn't exist
        if gh release view "$TAG" >/dev/null 2>&1; then
          echo "Release $TAG already exists, will upload assets to it."
        else
          echo "Creating release $TAG..."
          gh release create "$TAG" "${CREATE_FLAGS[@]}"
        fi

        # Collect all release files to upload — installers plus the electron-builder
        # update manifests (latest-*.yml) — deduplicated by basename.
        UPLOAD_FILES=()
        declare -A SEEN_BASENAMES

        # Files from each platform's build artifacts
        for asset_dir in "$ARTIFACTS_DIR"/release-assets-*/; do
          [ -d "$asset_dir" ] || continue
          while IFS= read -r -d '' file; do
            [ -f "$file" ] || continue
            basename_file="$(basename "$file")"

            # Skip known parasitic files (raw jpackage executables and internal metadata)
            if echo "$basename_file" | grep -qE "$SKIP_NAMES"; then
              echo "Skipping parasitic/internal file: $file"
              continue
            fi

            # Skip raw jpackage launcher .exe (no hyphen = no version/arch in name)
            if [[ "$basename_file" == *.exe ]] && [[ "$basename_file" != *-* ]]; then
              echo "Skipping raw launcher executable: $file"
              continue
            fi

            # Skip duplicate basenames
            if [[ -n "${SEEN_BASENAMES[$basename_file]+x}" ]]; then
              echo "Skipping duplicate: $file (already have ${SEEN_BASENAMES[$basename_file]})"
              continue
            fi
            SEEN_BASENAMES[$basename_file]="$file"

            UPLOAD_FILES+=("$file")
          done < <(find "$asset_dir" -type f -print0 | sort -z)
        done

        if [ ${#UPLOAD_FILES[@]} -eq 0 ]; then
          echo "No files to upload!"
          exit 1
        fi

        echo "Uploading ${#UPLOAD_FILES[@]} files to release $TAG..."
        gh release upload "$TAG" "${UPLOAD_FILES[@]}" --clobber

        RELEASE_URL="$(gh release view "$TAG" --json url --jq '.url')"
        echo "Release $TAG published with ${#UPLOAD_FILES[@]} assets."
        echo "release-url=$RELEASE_URL" >> "$GITHUB_OUTPUT"
